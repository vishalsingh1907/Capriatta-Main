<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Details | Capriatta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">

    <!-- Header -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-users text-indigo-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                        Club Details
                    </h1>
                </div>
                <a href="browse-clubs.html" class="flex items-center space-x-2 text-gray-600 hover:text-indigo-600 transition-colors">
                    <i class="fas fa-arrow-left"></i>
                    <span class="font-medium">Back to Clubs</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Loading -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
            <p class="mt-4 text-gray-600 font-medium">Loading club details...</p>
        </div>

        <!-- Club Info + Join Form Grid -->
        <div id="content" style="display: none;" class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Left: Club Information (2/3 width) -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-xl p-8">

                    <!-- Club Header -->
                    <div class="mb-6">
                        <div class="flex items-center space-x-2 mb-4">
                            <span id="club-type-badge" class="bg-indigo-100 text-indigo-700 text-sm font-bold px-4 py-2 rounded-full"></span>
                        </div>
                        <h2 id="club-name" class="text-3xl font-bold text-gray-900 mb-2"></h2>
                        <div class="flex items-center text-gray-600 space-x-4">
                            <span class="flex items-center">
                                <i class="fas fa-user-circle mr-2"></i>
                                <span id="club-creator"></span>
                            </span>
                            <span class="flex items-center">
                                <i class="fas fa-university mr-2"></i>
                                <span id="club-college"></span>
                            </span>
                        </div>
                    </div>

                    <!-- Mission -->
                    <div class="mb-6">
                        <h3 class="text-xl font-bold text-gray-900 mb-3 flex items-center">
                            <i class="fas fa-bullseye text-indigo-600 mr-2"></i>
                            Club Mission
                        </h3>
                        <p id="club-mission" class="text-gray-700 leading-relaxed"></p>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-indigo-50 rounded-xl p-4 text-center">
                            <div class="text-3xl font-bold text-indigo-600" id="member-count">0</div>
                            <div class="text-sm text-gray-600 mt-1">Members</div>
                        </div>
                        <div class="bg-purple-50 rounded-xl p-4 text-center">
                            <div class="text-3xl font-bold text-purple-600" id="created-date">-</div>
                            <div class="text-sm text-gray-600 mt-1">Created</div>
                        </div>
                    </div>

                    <!-- Contact -->
                    <div class="bg-gray-50 rounded-xl p-4">
                        <h4 class="font-semibold text-gray-800 mb-2">Contact</h4>
                        <a id="club-email" href="#" class="text-indigo-600 hover:underline flex items-center mb-2">
                            <i class="fas fa-envelope mr-2"></i>
                            <span></span>
                        </a>
                        <div id="club-phone-container" class="text-gray-700 flex items-center" style="display: none;">
                            <i class="fas fa-phone mr-2 text-indigo-600"></i>
                            <span id="club-phone"></span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right: Join Form (1/3 width) -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-xl p-6 sticky top-24">

                    <div class="text-center mb-6">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-full mb-3">
                            <i class="fas fa-user-plus text-3xl text-indigo-600"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-2">Join This Club</h3>
                        <p class="text-sm text-gray-600">Fill the form below to become a member</p>
                    </div>

                    <form id="join-form" class="space-y-4">

                        <!-- Name -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Your Name <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                name="memberName" 
                                required
                                readonly
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50"
                            >
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="email" 
                                name="memberEmail" 
                                required
                                readonly
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50"
                            >
                        </div>

                        <!-- Phone Number (NEW) -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Phone Number <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="tel" 
                                name="memberPhone" 
                                required
                                placeholder="Enter your phone number"
                                pattern="[0-9]{10}"
                                maxlength="10"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                            >
                            <p class="text-xs text-gray-500 mt-1">Enter 10-digit mobile number</p>
                        </div>

                        <!-- Course -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Course <span class="text-red-500">*</span>
                            </label>
                            <input 
                                type="text" 
                                name="memberCourse" 
                                required
                                readonly
                                class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50"
                            >
                        </div>

                        <!-- Why Join -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Why do you want to join? <span class="text-red-500">*</span>
                            </label>
                            <textarea 
                                name="reason" 
                                required
                                rows="3"
                                placeholder="Tell us why you're interested..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 resize-none"
                            ></textarea>
                        </div>

                        <!-- Submit -->
                        <button 
                            type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:shadow-lg transition-all"
                        >
                            <i class="fas fa-paper-plane mr-2"></i>Submit Application
                        </button>

                    </form>

                </div>
            </div>

        </div>

    </main>

    <!-- Load JavaScript -->
    <script type="module" src="js/club-details.js"></script>

</body>
</html>
