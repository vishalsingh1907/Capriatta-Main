<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capriatta | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/auth.js"></script>

</head>
<body class="antialiased bg-gray-50 text-gray-900">
    <div class="w-full min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white/95 backdrop-blur-xl shadow-2xl rounded-3xl border border-white/30 p-8">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 rounded-2xl flex items-center justify-center mb-4 shadow-xl">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Capriatta</h1>
                <p class="text-gray-500 text-sm">Student Community Platform</p>
            </div>

            <form id="registration-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="login-name" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Enter your full name">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">College Name</label>
                    <input type="text" id="login-college" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Enter your college name">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Course Name</label>
                    <input type="text" id="login-course" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="e.g., B.Tech CSE">
                </div>
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:scale-[1.02] transition-all">
                    Enter Dashboard
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
