<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | Capriatta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .notification-item {
            animation: slideIn 0.3s ease-out;
        }
        .badge-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">

    <!-- Header -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-bell text-indigo-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                        Notifications
                    </h1>
                    <span id="unread-badge" class="hidden bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full badge-pulse">0</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="mark-all-read-btn" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium hidden">
                        <i class="fas fa-check-double mr-1"></i>Mark All Read
                    </button>
                    <a href="browse-clubs.html" class="flex items-center space-x-2 text-gray-600 hover:text-indigo-600 transition-colors">
                        <i class="fas fa-arrow-left"></i>
                        <span class="font-medium">Back to Clubs</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Filter Tabs -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="flex space-x-4">
                <button class="filter-tab active px-4 py-2 rounded-lg font-medium transition-all" data-filter="all">
                    <i class="fas fa-list mr-2"></i>All
                </button>
                <button class="filter-tab px-4 py-2 rounded-lg font-medium transition-all" data-filter="unread">
                    <i class="fas fa-envelope mr-2"></i>Unread
                </button>
                <button class="filter-tab px-4 py-2 rounded-lg font-medium transition-all" data-filter="member-joined">
                    <i class="fas fa-user-plus mr-2"></i>New Members
                </button>
                <button class="filter-tab px-4 py-2 rounded-lg font-medium transition-all" data-filter="club-created">
                    <i class="fas fa-plus-circle mr-2"></i>Club Created
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
            <p class="mt-4 text-gray-600 font-medium">Loading notifications...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" style="display: none;" class="text-center py-20">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-gray-100 rounded-full mb-6">
                <i class="fas fa-bell-slash text-4xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">No Notifications Yet</h3>
            <p class="text-gray-600 mb-6">You'll see notifications here when members join your clubs</p>
            <a href="create-club.html" class="inline-flex items-center px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
                <i class="fas fa-plus mr-2"></i>Create Your First Club
            </a>
        </div>

        <!-- Notifications Container -->
        <div id="notifications-container" class="space-y-4" style="display: none;">
            <!-- Notifications will be inserted here -->
        </div>

    </main>

    <!-- Load JavaScript -->
    <script type="module" src="js/notifications.js"></script>

</body>
</html>
